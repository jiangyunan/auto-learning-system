# Auto Learning System 配置文件
# 本配置文件支持环境变量替换，使用 ${VAR_NAME} 或 $VAR 语法
# 示例: api_key: ${OPENAI_API_KEY}

# =============================================================================
# LLM 配置 - 大语言模型连接设置
# =============================================================================
llm:
  # API 基础 URL
  # 支持 OpenAI 兼容的任意端点：
  # - Ollama: http://localhost:11434/v1
  # - OpenAI: https://api.openai.com/v1
  # - 其他兼容端点: http://your-llm-server/v1
  base_url: https://api.deepseek.com
  # base_url: http://localhost:11434/v1

  # API 密钥
  # - Ollama: 可设置为任意字符串（如 "ollama"）
  # - OpenAI: 从 https://platform.openai.com/api-keys 获取
  # - 建议使用环境变量: ${OPENAI_API_KEY}
  api_key: sk-203c97c316884138ba19948ffa814e0a
  # api_key: ollama

  # 模型名称
  # - Ollama 示例: llama3, mistral, qwen2.5, deepseek-coder
  # - OpenAI 示例: gpt-4, gpt-4-turbo, gpt-3.5-turbo
  model: deepseek-chat
  # model: deepseek-r1:7b-qwen-distill-q4_K_M

  # 采样温度 (0.0 - 2.0)
  # - 较低值 (0.1-0.3): 输出更确定、保守
  # - 较高值 (0.7-1.0): 输出更创造性、多样化
  # - 技术文档建议: 0.3-0.5
  temperature: 0.7
  max_tokens: 8000
  timeout: 300

# =============================================================================
# 输入配置 - 文档处理方式
# =============================================================================
input:
  # 是否递归处理子目录
  # - true: 处理文件夹时递归进入所有子目录
  # - false: 仅处理当前目录的文件
  recursive: true

  # 最大递归深度
  # - 限制递归处理的目录层级，防止意外处理过多文件
  # - 设置为 0 表示无限制
  # - 建议根据文件夹结构设置合理值
  max_depth: 2

# =============================================================================
# 输出配置 - 生成文件设置
# =============================================================================
output:
  # 输出格式
  # - obsidian: 生成 Obsidian 格式的笔记（支持双向链接、YAML frontmatter）
  # - markdown: 标准 Markdown 格式
  format: obsidian

  # 输出目录路径
  # - 支持相对路径和绝对路径
  # - 目录会自动创建（如果不存在）
  # - 示例: ./vault/, ~/Documents/Notes/, ${HOME}/notes/
  path: /mnt/d/KnowledgeBase/知识库/程序猿/AI/LlamaIndex/

  # 文件名模板
  # - 可用变量:
  #   {title}     - 文档标题
  #   {id}        - 文档唯一ID
  #   {date}      - 处理日期 (YYYY-MM-DD)
  #   {time}      - 处理时间 (HH-MM)
  # - 建议保留 .md 扩展名
  filename_template: "{title}.md"

# =============================================================================
# 功能特性配置
# =============================================================================
features:
  # 是否生成 L2 级中文学习笔记
  # - true: 生成详细的中文结构化学习笔记（包含概念解释、代码示例等）
  # - false: 仅生成 L1 级 bullet points 摘要
  # - 注意: 生成中文笔记会消耗更多 token 和处理时间
  chinese_notes: true

# =============================================================================
# 文本分块配置 - 控制文档分割策略
# =============================================================================
chunker:
  # 目标 token 数
  # - 每个文本块的目标大小（用于 LLM 处理）
  # - 较小的值: 更精细的处理，更多 API 调用
  # - 较大的值: 更少的 API 调用，但可能超出模型上下文限制
  # - 建议: 根据模型上下文长度设置（如 4K 上下文可设为 1500-2000）
  target_tokens: 1500

  # 重叠字符数
  # - 相邻文本块之间的重叠字符数，保持上下文连贯性
  # - 较大的值: 更好的上下文保留，但会增加重复内容
  # - 建议: 100-300 字符
  overlap_chars: 200

# =============================================================================
# 缓存配置 - 避免重复处理
# =============================================================================
cache:
  # 是否启用缓存
  # - true: 启用 SQLite 缓存，相同内容不会重复处理
  # - false: 禁用缓存，每次都会调用 LLM
  # - 建议生产环境启用，节省 API 费用和时间
  enabled: true

  # 缓存数据库路径
  # - SQLite 数据库文件存储位置
  # - 支持相对路径和绝对路径
  # - 数据库文件会自动创建
  db_path: ./data/cache.db

# =============================================================================
# URL 递归采集配置（可选）
# 用于递归爬取网站文档，自动合并相关页面
# =============================================================================
crawl:
  # URL 匹配模式列表
  # - 支持通配符 * 匹配任意字符
  # - 页面 URL 匹配任一模式时会被采集
  # - 示例:
  #   "*.md"       - 匹配所有 .md 结尾的 URL
  #   "*/docs/*"   - 匹配路径包含 /docs/ 的 URL
  #   "*/api/*"    - 匹配 API 文档页面
  patterns:
    - "*.md"
    - "*/docs/*"

  # 最大递归深度
  # - 从起始 URL 开始，跟踪链接的最大层数
  # - 深度越大，采集的页面越多，处理时间越长
  # - 建议: 3-5（过大会采集过多无关页面）
  max_depth: 3

# =============================================================================
# 使用示例
# =============================================================================
#
# 1. 使用 Ollama 本地模型：
#    llm:
#      base_url: http://localhost:11434/v1
#      api_key: ollama
#      model: llama3.2
#
# 2. 使用 OpenAI API：
#    llm:
#      base_url: https://api.openai.com/v1
#      api_key: ${OPENAI_API_KEY}
#      model: gpt-4
#
# 3. 仅生成英文摘要（不生成中文笔记）：
#    features:
#      chinese_notes: false
#
# 4. 更大的分块（适合长上下文模型）：
#    chunker:
#      target_tokens: 3000
#      overlap_chars: 300
